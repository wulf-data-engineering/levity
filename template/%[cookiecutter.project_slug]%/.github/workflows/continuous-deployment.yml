name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend
          cache-on-failure: true
      - name: Install Rust
        working-directory: ./backend
        run: rustup show # picks the version from rust-toolchain.toml
      - name: Setup Cross-Compilation
        working-directory: ./backend
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
      - name: Compile Backend
        working-directory: backend
        run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package Artifacts
        run: |
          mkdir -p backend-artifacts
          for file in backend/target/aarch64-unknown-linux-gnu/release/*; do
            if [ -f "$file" ]; then
              cp "$file" backend-artifacts/
            fi
          done
      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-binaries
          path: backend-artifacts/
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  deploy-staging:
    needs: [build-backend, build-frontend]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      domain: ${{ vars.DOMAIN_STAGING }}
    secrets:
      awsRoleArn: ${{ secrets.AWS_ROLE_ARN_STAGING }}

  deploy-production:
    needs: [deploy-staging]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      domain: ${{ vars.DOMAIN_PRODUCTION }}
    secrets:
      awsRoleArn: ${{ secrets.AWS_ROLE_ARN_PRODUCTION }}
