# Deploys certificate and app stack to an AWS account
name: Deploy Stack

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      domain:
        required: true
        type: string
      certificateArn:
        required: true
        type: string
      awsRoleArn:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.awsRoleArn }}
          aws-region: eu-central-1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install dependencies (Infrastructure)
        working-directory: ./infrastructure
        run: npm ci

      - name: Download Backend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-binaries
          path: downloaded-backend

      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: downloaded-frontend

      - name: CDK Deploy for ${{ inputs.domain }}
        working-directory: ./infrastructure
        run: |
          npx cdk deploy AppStack --require-approval never \
            -c mode=environment \
            -c environment=${{ inputs.environment }} \
            -c domain=${{ inputs.domain }} \
            -c certificateArn=${{ inputs.certificateArn }} \
            -c githubRepo=${{ github.repository }} \
            -c backendPath=../downloaded-backend \
            -c frontendPath=../downloaded-frontend
